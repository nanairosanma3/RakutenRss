<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <header>
    <div class="header-container">
      <div class="header-title">
        <div class="header-title-logo"></div>
        <div class="header-title-text">OrderBookMonitor</div>
      </div>
      <div class="header-nav">
        <div class="header-nav-stock">
          <p>銘柄</p>
          <ul class="header-nav-stock-name">
            <li>トヨタ(7203)</li>
            <li>ソニーG(6758)</li>
            <li>任天堂(7974)</li>
          </ul>
        </div>
        <div class="header-nav-sector">
          <p>セクター</p>
          <ul class="header-nav-sector-name">
            <li>半導体</li>
            <li>自動車</li>
          </ul>
        </div>
        <div class="header-nav-others">
          <p>その他</p>
          <ul>
            <li>自由チャット</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="header-character">test</div>
  </header>

  <main>
    <div class="chat-title">
      <div class="chat-title-left">
        <p>トヨタ(7203)</p>
        <p class="chat-title-logo">AI auto-watch</p>
      </div>
      <div class="chat-title-right">
        <p>リセット</p>
      </div>
    </div>
    <!-- あとで消す -->
    <div class="chat-room">
      <ul>
        <li class="chat you">
          <p class="mes">相手のメッセージ</p>
          <div class="status">17:00</div>
        </li>
        <li class="chat me">
          <p class="mes">自分のメッセージ自分のメッセージ自分のメッセージ自分のメッセージ自分のメッセージ自分のメッセージ</p>
          <div class="status">既読<br>17:05</div>
        </li>
      </ul>
    </div>
    <!-- kokomade -->
  </main>
</body>

</html>
